name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ====== 服务器代码检查（shared/） ======
  check-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node -e "require('./server.js')"

