name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 检查 Node.js 服务器代码
  lint-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx eslint server.js --fix || true
      - run: node -e "require('./server.js')"

  # 检查 Web 前端代码
  lint-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install || true
      - run: npx eslint src/ --fix || true
